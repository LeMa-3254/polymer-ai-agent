name: Generate & Commit Weekly Digest

on:
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches: [main]
    paths:
      - run_digest.py         # re-run whenever the digest script changes

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest documents
        run: python3 run_digest.py

      - name: Commit & push output files
        run: |
          git config user.email "agent@polymer-ai"
          git config user.name  "Polymer AI Agent"
          git add output/
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "ci: regenerate digest documents [skip ci]"
          git push
